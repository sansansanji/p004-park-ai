version: '3.8'

services:
  app:
    build: .
    container_name: starhub_app
    ports:
      - "8080:8080"
      - "8082:8082"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - FLASK_ENV=production
    restart: always

  nginx:
    image: nginx:alpine
    container_name: starhub_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: always
